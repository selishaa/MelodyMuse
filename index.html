<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody Muse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <ul>
            <li class="brand"><img src="logo.png" alt="Spotify"> Spotify</li>
            <li>Home</li>
            <li>About</li>
            
        </ul>
    </nav>
    <div class="container">
        <div class="songList">
            <h1>Best of TAY- Favourites</h1>
            <div class="songItem">
                <img src="cover1.png" alt="1">
                <span>Back To December</span>
                <span class="songlistplay"> <span>  04:34 </span> <i class="fa-regular fa-circle-play"></i> </span>
            </div>
        </div>
        <div class="songBanner"></div>
    </div>

    <div class="bottom">
         <input type="range" name="range" id="MyProgressBar" min="0" max="100"> 
         <div class="icons">
            <!--fontawesome icons-->
            <i class="fa-solid fa-3x fa-backward-fast"></i>
            <i class="fa-regular fa-3x fa-circle-play"></i>
            <i class="fa-solid fa-3x fa-forward-fast"></i>
         </div>
    </div>
    <script src="https://kit.fontawesome.com/8a39135113.js" crossorigin="anonymous"></script>
   <script src="script.js"></script>
    
</body>
</html>
